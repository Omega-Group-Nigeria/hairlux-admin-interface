<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Hairlux — Select Portal</title>
    <meta name="msapplication-TileColor" content="#066fd1" />
    <meta name="theme-color" content="#066fd1" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link href="./assets/styles/tabler.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-flags.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-socials.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-payments.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-vendors.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-marketing.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-themes.min.css" rel="stylesheet" />
    <style>
        @import url("https://rsms.me/inter/inter.css");

        .portal-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.75rem 2rem;
            border: 1.5px solid transparent;
            border-radius: var(--tblr-border-radius-lg);
            text-decoration: none;
            transition: border-color 0.18s, transform 0.15s;
            cursor: pointer;
            min-height: 220px;
            height: 100%;
        }

        .portal-card:hover {
            transform: translateY(-2px);
            text-decoration: none;
        }

        .portal-card:active {
            transform: translateY(0px);
        }

        .portal-card--admin {
            background: #eef3fd;
            border-color: #c3d4f8;
            color: #1e3a8a;
        }

        .portal-card--admin:hover {
            background: #e2ebfc;
            border-color: #92b2f5;
            color: #1e3a8a;
        }

        .portal-card--admin .portal-icon {
            background: #c3d4f8;
        }

        .portal-card--admin .portal-icon svg {
            stroke: #1a56db;
        }

        .portal-card--admin .portal-title {
            color: #1e3a8a;
        }

        .portal-card--admin .portal-desc {
            color: #3b5bbc;
        }

        .portal-card--bookings {
            background: #ecfdf5;
            border-color: #a7f3d0;
            color: #065f46;
        }

        .portal-card--bookings:hover {
            background: #d1fae5;
            border-color: #6ee7b7;
            color: #065f46;
        }

        .portal-card--bookings .portal-icon {
            background: #a7f3d0;
        }

        .portal-card--bookings .portal-icon svg {
            stroke: #0e9f6e;
        }

        .portal-card--bookings .portal-title {
            color: #065f46;
        }

        .portal-card--bookings .portal-desc {
            color: #047857;
        }

        .portal-card .portal-icon {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.3rem;
        }

        .portal-card .portal-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            text-align: center;
        }

        .portal-card .portal-desc {
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.55;
        }
    </style>
</head>

<body>
    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/tabler-theme.min.js"></script>
    <div class="page page-center">
        <div class="container py-4" style="max-width: 1000px;">

            <!-- Logo -->
            <div class="text-center mb-4">
                <a href="." aria-label="Hairlux" class="navbar-brand navbar-brand-autodark">
                    <img src="assets/img/logo.png" style="width: 100px;" alt="Hairlux Logo">
                </a>
            </div>

            <!-- Selection card -->
            <div class="card card-md">
                <div class="card-body">
                    <h2 class="h2 text-center mb-1">Where would you like to login?</h2>
                    <p class="text-secondary text-center mb-4" style="font-size: 0.9rem;">Choose the portal you want to access</p>

                    <div class="row g-3">
                        <!-- Admin Panel -->
                        <div class="col-12 col-sm-6 d-flex">
                            <a href="./login.html?portal=admin" class="portal-card portal-card--admin">
                                <div class="portal-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M10 13a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                                        <path d="M8 21v-1a2 2 0 0 1 2 -2h4a2 2 0 0 1 2 2v1" />
                                        <path d="M15 5a2 2 0 1 0 -4 0" />
                                        <path d="M3 9h18" />
                                        <path d="M3 15h18" />
                                        <rect x="3" y="3" width="18" height="18" rx="2" />
                                    </svg>
                                </div>
                                <div class="portal-title">Admin Panel</div>
                                <div class="portal-desc">Manage users, services, analytics and system settings</div>
                            </a>
                        </div>

                        <!-- Booking Management -->
                        <div class="col-12 col-sm-6 d-flex">
                            <a href="./login.html?portal=bookings" class="portal-card portal-card--bookings">
                                <div class="portal-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <rect x="4" y="5" width="16" height="16" rx="2" />
                                        <line x1="16" y1="3" x2="16" y2="7" />
                                        <line x1="8" y1="3" x2="8" y2="7" />
                                        <line x1="4" y1="11" x2="20" y2="11" />
                                        <line x1="10" y1="16" x2="14" y2="16" />
                                        <line x1="12" y1="14" x2="12" y2="18" />
                                    </svg>
                                </div>
                                <div class="portal-title">Booking Management</div>
                                <div class="portal-desc">View and manage appointments, schedules and reservations</div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="./assets/js/tabler.min.js" defer></script>
</body>

</html>
