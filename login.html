<body>
    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/tabler-theme.min.js"></script>
    <div class="page page-center">
        <div class="container container-tight py-4">
            <div class="text-center mb-4">
                <!-- BEGIN NAVBAR LOGO --><a href="." aria-label="Tabler"
                    class="navbar-brand navbar-brand-autodark"><img src="assets/img/logo.png" style="width: 70px;" alt=""></a><!-- END NAVBAR LOGO -->
                    <p style="font-size: 14px;font-weight: 600;">Hairlux Administrator Panel</p>
            </div>
            
            <!-- Alert: hidden by default, shown on error/success -->
            <div id="login-alert" class="alert alert-dismissible d-none mb-3" role="alert">
                <div class="d-flex">
                    <div id="login-alert-icon" class="me-2"></div>
                    <div><div id="login-alert-message" class="fw-medium"></div></div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card card-md">
                <div class="card-body">
                    <h2 class="h2 text-center mb-4">Login to your account</h2>
                    <form id="login-form" autocomplete="off" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="login-email">Email address</label>
                            <input id="login-email" type="email" class="form-control" placeholder="your@email.com" autocomplete="email" required />
                        </div>
                        <div class="mb-2">
                            <label class="form-label" for="login-password">
                                Password
                                <!-- <span class="form-label-description">
                                    <a href="./forgot-password.html">Forgot password</a>
                                </span> -->
                            </label>
                            <div class="input-group input-group-flat">
                                <input id="login-password" type="password" class="form-control" placeholder="Your password" autocomplete="current-password" required />
                                <span class="input-group-text">
                                    <a href="#" id="toggle-password" class="link-secondary" title="Show password" data-bs-toggle="tooltip">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" class="icon icon-1">
                                            <path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                                            <path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6" />
                                        </svg>
                                    </a>
                                </span>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-check">
                                <input type="checkbox" id="login-remember" class="form-check-input" />
                                <span class="form-check-label">Remember me on this device</span>
                            </label>
                        </div>
                        <div class="form-footer">
                            <button type="submit" id="login-btn" class="btn btn-primary w-100">
                                <span id="login-btn-text">Sign in</span>
                                <span id="login-btn-spinner" class="d-none">
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                    Signing in...
                                </span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="./assets/js/tabler.min.js" defer></script>
    <script src="./assets/js/api-utils/auth.js"></script>
    <script src="./assets/js/api-utils/rbac.js"></script>
    <script>
        // Redirect immediately if already logged in
        if (Auth.isLoggedIn()) { window.location.href = "./index.html"; }

        var ICON_DANGER = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon alert-icon"><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>';
        var ICON_SUCCESS = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon alert-icon"><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M9 12l2 2l4 -4"/></svg>';

        function showAlert(type, message) {
            var el  = document.getElementById('login-alert');
            var msg = document.getElementById('login-alert-message');
            var ico = document.getElementById('login-alert-icon');
            el.className = 'alert alert-dismissible alert-' + type + ' mb-3';
            ico.innerHTML = type === 'danger' ? ICON_DANGER : ICON_SUCCESS;
            msg.textContent = message;
            el.classList.remove('d-none');
        }
        function hideAlert() {
            document.getElementById('login-alert').classList.add('d-none');
        }

        document.getElementById('toggle-password').addEventListener('click', function (e) {
            e.preventDefault();
            var input = document.getElementById('login-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlert();
            var email    = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value;
            var btn      = document.getElementById('login-btn');
            var btnText  = document.getElementById('login-btn-text');
            var spinner  = document.getElementById('login-btn-spinner');

            if (!email || !password) {
                showAlert('danger', 'Please enter your email and password.');
                return;
            }
            btn.disabled = true;
            btnText.classList.add('d-none');
            spinner.classList.remove('d-none');

            try {
                await Auth.login(email, password);
                showAlert('success', 'Login successful! Loading your workspace…');
                // Fetch server-fresh permissions before redirecting so the user
                // lands directly on the first page they are allowed to see.
                await RBAC.fetchMe();
                var dest = RBAC.can('analytics:read') ? './index.html' : ('./' + RBAC.getFirstAccessiblePage());
                window.location.href = dest;
            } catch (err) {
                showAlert('danger', err.message || 'Login failed. Please try again.');
                btn.disabled = false;
                btnText.classList.remove('d-none');
                spinner.classList.add('d-none');
            }
        });
    </script>
</body>

</html>
