<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Forgot Password - Hairlux Admin</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link href="./assets/styles/tabler.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-themes.min.css" rel="stylesheet" />
    <style>
        @import url("https://rsms.me/inter/inter.css");
        body {
            background:
                radial-gradient(1200px 500px at 10% -10%, rgba(34, 197, 94, .14), transparent 55%),
                radial-gradient(1200px 500px at 90% 110%, rgba(59, 130, 246, .14), transparent 55%),
                var(--tblr-bg-surface);
            min-height: 100vh;
        }
        .auth-wrap {
            max-width: 460px;
            margin: 0 auto;
        }
        .brand-caption {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .02em;
        }
    </style>
</head>

<body>
    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/tabler-theme.min.js"></script>

    <div class="page page-center">
        <div class="container py-4">
            <div class="auth-wrap">
                <div class="text-center mb-4">
                    <a href="./login.html" class="navbar-brand navbar-brand-autodark">
                        <img src="assets/img/logo.png" style="width: 70px;" alt="Hairlux logo">
                    </a>
                    <p class="brand-caption mb-0">Hairlux Administrator Panel</p>
                </div>

                <div id="forgot-alert" class="alert d-none mb-3" role="alert"></div>

                <div class="card card-md shadow-sm border-0">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-2">Forgot password</h2>
                        <p class="text-secondary text-center mb-4">Enter your admin email to receive a reset link.</p>

                        <form id="forgot-form" novalidate>
                            <div class="mb-3">
                                <label class="form-label" for="forgot-email">Email address</label>
                                <input id="forgot-email" type="email" class="form-control" placeholder="admin@hairlux.com" autocomplete="email" required>
                            </div>

                            <div class="form-footer">
                                <button id="forgot-btn" type="submit" class="btn btn-primary w-100">
                                    <span id="forgot-btn-text">Send reset link</span>
                                    <span id="forgot-btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-transparent">
                        <div class="text-center small">
                            Remembered your password?
                            <a href="./login.html">Back to login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/tabler.min.js" defer></script>
    <script src="./assets/js/api-utils/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = "./index.html";
        }

        var alertEl = document.getElementById("forgot-alert");
        var formEl = document.getElementById("forgot-form");
        var emailEl = document.getElementById("forgot-email");
        var btnEl = document.getElementById("forgot-btn");
        var btnTextEl = document.getElementById("forgot-btn-text");
        var btnSpinnerEl = document.getElementById("forgot-btn-spinner");

        function setAlert(type, message) {
            alertEl.className = "alert alert-" + type + " mb-3";
            alertEl.textContent = message;
        }

        function hideAlert() {
            alertEl.className = "alert d-none mb-3";
            alertEl.textContent = "";
        }

        function setLoading(loading) {
            btnEl.disabled = loading;
            btnTextEl.textContent = loading ? "Sending..." : "Send reset link";
            btnSpinnerEl.classList.toggle("d-none", !loading);
        }

        function getApiBase() {
            return String(window.API_BASE || "").replace(/\/$/, "");
        }

        formEl.addEventListener("submit", async function (e) {
            e.preventDefault();
            hideAlert();

            var email = String(emailEl.value || "").trim();
            if (!email) {
                setAlert("danger", "Email is required.");
                return;
            }

            setLoading(true);

            try {
                var response = await fetch(getApiBase() + "/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email })
                });

                var raw = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    throw new Error(raw.message || "Failed to send reset link.");
                }

                setAlert("success", raw.message || "If the email exists, a password reset link has been sent.");
                formEl.reset();
            } catch (err) {
                setAlert("danger", err.message || "Failed to send reset link.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
