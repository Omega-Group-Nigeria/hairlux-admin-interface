<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Reset Password - Hairlux Admin</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link href="./assets/styles/tabler.min.css" rel="stylesheet" />
    <link href="./assets/styles/tabler-themes.min.css" rel="stylesheet" />
    <style>
        @import url("https://rsms.me/inter/inter.css");
        body {
            background:
                radial-gradient(1000px 420px at 12% -5%, rgba(59, 130, 246, .14), transparent 55%),
                radial-gradient(1000px 420px at 92% 110%, rgba(34, 197, 94, .12), transparent 55%),
                var(--tblr-bg-surface);
            min-height: 100vh;
        }
        .auth-wrap {
            max-width: 500px;
            margin: 0 auto;
        }
        .rule-list {
            margin: 0;
            padding-left: 1rem;
            color: var(--tblr-secondary);
            font-size: .85rem;
        }
        .brand-caption {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .02em;
        }
    </style>
</head>

<body>
    <script>
        (function () {
            var token = String(new URLSearchParams(window.location.search).get("token") || "").trim();
            if (!token) {
                window.location.replace("./forgot-password.html");
            }
        }());
    </script>

    <script src="./assets/js/config.js"></script>
    <script src="./assets/js/tabler-theme.min.js"></script>

    <div class="page page-center">
        <div class="container py-4">
            <div class="auth-wrap">
                <div class="text-center mb-4">
                    <a href="./login.html" class="navbar-brand navbar-brand-autodark">
                        <img src="assets/img/logo.png" style="width: 70px;" alt="Hairlux logo">
                    </a>
                    <p class="brand-caption mb-0">Hairlux Administrator Panel</p>
                </div>

                <div id="reset-alert" class="alert d-none mb-3" role="alert"></div>

                <div class="card card-md shadow-sm border-0">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-2">Reset password</h2>
                        <p class="text-secondary text-center mb-4">Set a new password for your admin account.</p>

                        <form id="reset-form" novalidate>
                            <div class="mb-3">
                                <label class="form-label" for="new-password">New password</label>
                                <input id="new-password" type="password" class="form-control" autocomplete="new-password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="confirm-password">Confirm new password</label>
                                <input id="confirm-password" type="password" class="form-control" autocomplete="new-password" required>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="show-passwords">
                                <label class="form-check-label" for="show-passwords">Show passwords</label>
                            </div>

                            <div class="alert alert-info mb-4" role="alert">
                                <div class="fw-semibold mb-1">Password requirements</div>
                                <ul class="rule-list">
                                    <li>At least 8 characters</li>
                                    <li>At least one uppercase letter</li>
                                    <li>At least one lowercase letter</li>
                                    <li>At least one number</li>
                                </ul>
                            </div>

                            <div class="form-footer">
                                <button id="reset-btn" type="submit" class="btn btn-primary w-100">
                                    <span id="reset-btn-text">Reset password</span>
                                    <span id="reset-btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="card-footer bg-transparent">
                        <div class="text-center small">
                            Remembered your password?
                            <a href="./login.html">Back to login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/tabler.min.js" defer></script>
    <script src="./assets/js/api-utils/auth.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = "./index.html";
        }

        var token = String(new URLSearchParams(window.location.search).get("token") || "").trim();
        var alertEl = document.getElementById("reset-alert");
        var formEl = document.getElementById("reset-form");
        var newPasswordEl = document.getElementById("new-password");
        var confirmPasswordEl = document.getElementById("confirm-password");
        var showPasswordsEl = document.getElementById("show-passwords");
        var btnEl = document.getElementById("reset-btn");
        var btnTextEl = document.getElementById("reset-btn-text");
        var btnSpinnerEl = document.getElementById("reset-btn-spinner");

        function setAlert(type, message) {
            alertEl.className = "alert alert-" + type + " mb-3";
            alertEl.textContent = message;
        }

        function hideAlert() {
            alertEl.className = "alert d-none mb-3";
            alertEl.textContent = "";
        }

        function setLoading(loading) {
            btnEl.disabled = loading;
            btnTextEl.textContent = loading ? "Resetting..." : "Reset password";
            btnSpinnerEl.classList.toggle("d-none", !loading);
        }

        function getApiBase() {
            return String(window.API_BASE || "").replace(/\/$/, "");
        }

        function isStrongPassword(value) {
            var v = String(value || "");
            if (v.length < 8) return false;
            if (!/[A-Z]/.test(v)) return false;
            if (!/[a-z]/.test(v)) return false;
            if (!/[0-9]/.test(v)) return false;
            return true;
        }

        showPasswordsEl.addEventListener("change", function () {
            var t = showPasswordsEl.checked ? "text" : "password";
            newPasswordEl.type = t;
            confirmPasswordEl.type = t;
        });

        formEl.addEventListener("submit", async function (e) {
            e.preventDefault();
            hideAlert();

            var newPassword = String(newPasswordEl.value || "");
            var confirmPassword = String(confirmPasswordEl.value || "");

            if (!newPassword || !confirmPassword) {
                setAlert("danger", "Both password fields are required.");
                return;
            }

            if (!isStrongPassword(newPassword)) {
                setAlert("danger", "Password must be at least 8 characters and include uppercase, lowercase, and a number.");
                return;
            }

            if (newPassword !== confirmPassword) {
                setAlert("danger", "Passwords do not match.");
                return;
            }

            setLoading(true);

            try {
                var response = await fetch(getApiBase() + "/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, newPassword: newPassword })
                });

                var raw = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    throw new Error(raw.message || "Failed to reset password.");
                }

                setAlert("success", raw.message || "Password has been reset successfully.");
                formEl.reset();
                showPasswordsEl.checked = false;
                newPasswordEl.type = "password";
                confirmPasswordEl.type = "password";
                window.setTimeout(function () {
                    window.location.href = "./login.html";
                }, 1400);
            } catch (err) {
                setAlert("danger", err.message || "Failed to reset password.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
